version: '3.9'

services:
  db:
    image: postgres:15
    restart: always
    env_file:
      - .env
    environment:
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_INITDB_ARGS=--auth-host=md5
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    restart: always
    volumes:
      - redis_data:/data

  backend:
    image: ghcr.io/jakeymac/job-automation-platform-backend:latest
    restart: always
    command: >
      sh -c '
        echo "Waiting for database..." &&
        sleep 5 &&
        python manage.py migrate &&
        gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 3 --threads 2 --timeout 120
      '
    expose:
      - "8000"
    volumes:
      - ./media:/app/media
    depends_on:
      - db
      - redis
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/jobs"]
      interval: 30s
      timeout: 10s
      retries: 5
    

  worker:
    image: ghcr.io/jakeymac/job-automation-platform-backend:latest
    restart: always
    command: celery -A config worker -l info --concurrency=4
    volumes:
      - ./media:/app/media
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      - db
      - redis
    env_file:
      - .env

  beat:
    image: ghcr.io/jakeymac/job-automation-platform-backend:latest
    restart: always
    command: > 
      sh -c '
        echo "Waiting for backend..."
        sleep 10
        celery -A config beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler
      '
    depends_on:
      - redis
      - backend
    env_file:
      - .env

  frontend:
    image: ghcr.io/jakeymac/job-automation-platform-frontend:latest
    restart: always
    ports:
      - "3000:80"
    depends_on:
      - backend

  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
      - ./media:/app/media
      - ./logs:/app/logs
    depends_on:
      - frontend
      - backend

volumes:
  postgres_data:
  redis_data:
